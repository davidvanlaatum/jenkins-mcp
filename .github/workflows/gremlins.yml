name: Mutation Testing

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: gremlins-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gremlins:
    name: Gremlins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Gremlins
        uses: go-gremlins/gremlins-action@v1
        with:
          version: v0.6.0
          args: --tags=no_integration --workers=2 --test-cpu=1 --timeout-coefficient=3 --output-statuses=lctv

      - name: Write baseline summary
        if: always()
        run: |
          echo '## Gremlins mutation testing' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo 'This job is informational while the initial mutation baseline is established.' >> "$GITHUB_STEP_SUMMARY"
          echo 'Package scope: module root with -tags=no_integration' >> "$GITHUB_STEP_SUMMARY"
          echo 'Gremlins version: v0.6.0' >> "$GITHUB_STEP_SUMMARY"
