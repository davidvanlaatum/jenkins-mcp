name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: File hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit file checks
        run: |
          pre-commit run check-added-large-files --all-files
          pre-commit run check-json --all-files
          pre-commit run check-yaml --all-files
          pre-commit run end-of-file-fixer --all-files
          pre-commit run trailing-whitespace --all-files

  tidy:
    name: Go mod tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  imports:
    name: Go imports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goimports
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Verify Go imports
        run: |
          files=$(find . -name '*.go' -not -path './vendor/*')
          if [ -n "$files" ]; then
            goimports -w $files
          fi
          git diff --exit-code

  lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install gotest.tools/gotestsum@latest

      - name: Run tests with coverage
        run: |
          gotestsum --junitfile junit.xml --jsonfile test-results.json -- \
            -race -covermode=atomic -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests
          path: junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Write coverage summary
        if: always()
        run: |
          echo '## Test coverage' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage.txt ]; then
            cat coverage.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Coverage was not generated.' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-and-coverage-results
          path: |
            junit.xml
            test-results.json
            coverage.out
            coverage.txt

  build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server
        run: go build -trimpath ./cmd/jenkins-mcp-server

  boundaries:
    name: Package boundaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify MCP SDK import boundaries
        run: |
          if grep -R "github.com/modelcontextprotocol/go-sdk/mcp" internal/tools internal/jenkins internal/config internal/artifacts internal/audit 2>/dev/null; then
            echo "MCP SDK import leaked outside internal/mcpserver" >&2
            exit 1
          fi

  goreleaser-check:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check

      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=publish
