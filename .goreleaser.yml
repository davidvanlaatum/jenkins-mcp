version: 2

project_name: jenkins-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: jenkins-mcp-server
    main: ./cmd/jenkins-mcp-server
    binary: jenkins-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/david/jenkins-mcp/internal/app.Version={{ .Version }}

archives:
  - id: jenkins-mcp-server
    ids:
      - jenkins-mcp-server
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
